<!DOCTYPE html>
<html>
<head>
    <title>404 Not Found</title>
    <script type="text/javascript">
        document.addEventListener('DOMContentLoaded', function() {
            var path = window.location.pathname;
            var prMatch = path.match(/\/pr-preview\/([^\/]+)\/.*/);

            function replaceContent(url) {
                fetch(url)
                    .then(function(response) {
                        return response.text();
                    })
                    .then(function(html) {
                        document.open();
                        document.write(html);
                        document.close();
                    })
                    .catch(function(error) {
                        console.error('Failed to fetch the page:', error);
                    });
            }

            if (prMatch) {
                // If in a PR preview path, fetch the PR-specific 404 content
                replaceContent('/pr-preview/' + prMatch[1] + '/404.html');
            } else {
                // If not in a PR preview path, fetch the main index.html content
                replaceContent('/index.html');
            }
        });
    </script>
</head>
<body>
    Loading...
</body>
</html>
